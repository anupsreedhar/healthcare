spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/healthcare
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # auto-create/update tables based on entities
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always       # run schema/data.sql if present

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
